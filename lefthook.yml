min_version: 2.1.0

pre-commit:
  parallel: true
  jobs:
    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --workspace --all-targets --locked -- -D warnings

commit-msg:
  scripts:
    "check-conventional-commit.sh":
      runner: sh

pre-push:
  jobs:
    - name: Run tests
      run: cargo test --workspace --locked
