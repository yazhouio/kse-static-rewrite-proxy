name: Build Docker Images

on:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: kubesphere
  IMAGE_NAME: kse-static-rewrite-proxy
  KUBESPHERE_HUB_REGISTRY: hub.kubesphere.com.cn

jobs:
  build-by-arch:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log In To KubeSphere Hub
        if: ${{ github.event_name == 'release' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.KUBESPHERE_HUB_REGISTRY }}
          username: ${{ secrets.KUBESPHERE_HUB_USERNAME }}
          password: ${{ secrets.KUBESPHERE_HUB_TOKEN }}

      - name: Build PR Image
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          cache-to: type=gha,mode=min,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}

      - name: Build And Push By Digest
        if: ${{ github.event_name == 'release' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.KUBESPHERE_HUB_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          cache-to: type=gha,mode=min,scope=${{ env.IMAGE_NAME }}-${{ matrix.arch }}

      - name: Export Digest
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          mkdir -p digests
          echo "${{ steps.build.outputs.digest }}" > "digests/${{ matrix.arch }}.txt"

      - name: Upload Digest
        if: ${{ github.event_name == 'release' }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: digests/*.txt

  merge-release-manifest:
    if: ${{ github.event_name == 'release' }}
    name: Merge Release manifest
    runs-on: ubuntu-latest
    needs:
      - build-by-arch
    steps:
      - name: Download Digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: digests
          merge-multiple: true

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log In To KubeSphere Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.KUBESPHERE_HUB_REGISTRY }}
          username: ${{ secrets.KUBESPHERE_HUB_USERNAME }}
          password: ${{ secrets.KUBESPHERE_HUB_TOKEN }}

      - name: Create And Push Manifest
        shell: bash
        run: |
          set -euo pipefail

          image_repository="${KUBESPHERE_HUB_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
          image_tag="${image_repository}:${GITHUB_REF_NAME}"

          mapfile -t digest_files < <(find digests -maxdepth 1 -type f -name '*.txt' | sort)
          image_references=()
          platforms=()
          for digest_file in "${digest_files[@]}"; do
            arch="$(basename "${digest_file}" .txt)"
            digest="$(cat "${digest_file}")"
            image_references+=("${image_repository}@${digest}")
            platforms+=("linux/${arch}")
          done

          docker buildx imagetools create \
            --tag "${image_tag}" \
            "${image_references[@]}"

          image_digest="$(
            docker buildx imagetools inspect "${image_tag}" \
              | sed -n 's/^Digest: //p' \
              | head -n1
          )"
          platform_list="$(printf '`%s`, ' "${platforms[@]}")"
          platform_list="${platform_list%, }"

          {
            echo "## Multi-platform image"
            echo
            echo "- Tag: \`${image_tag}\`"
            echo "- Digest: \`${image_digest}\`"
            echo "- Platforms: ${platform_list}"
          } >> "${GITHUB_STEP_SUMMARY}"
